{% load static console_static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Service Foundation 控制台</title>
    <link rel="stylesheet" href="{% static_ver 'console/css/tailwind.css' %}">
    <link rel="stylesheet" href="{% static_ver 'console/css/style.css' %}">
    <link rel="stylesheet" href="{% static_ver 'console/css/theme.css' %}">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center text-sm">
    <div class="w-full max-w-md bg-white shadow-md rounded-lg p-8">
        <h1 class="text-xl font-semibold text-gray-800 mb-6 text-center">控制台登录</h1>
        {% if form.non_field_errors %}
        <div class="text-red-600 mb-4 text-center text-sm">{{ form.non_field_errors }}</div>
        {% endif %}
        <form method="post" action="{% url 'console:login' %}" class="space-y-4">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next|default:'' }}">
            <div>
                <label for="{{ form.username.id_for_label }}" class="block text-gray-700 mb-1">用户名</label>
                {{ form.username.errors }}
                <input type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}"
                       required autofocus
                       class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       value="{{ form.username.value|default:'' }}">
            </div>
            <div>
                <label for="{{ form.password.id_for_label }}" class="block text-gray-700 mb-1">密码</label>
                {{ form.password.errors }}
                <input type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" required
                       class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition-colors">
                登录
            </button>
        </form>
        <p class="text-gray-500 text-xs mt-4 text-center">需使用 Django <code class="bg-gray-100 px-1 rounded">is_staff</code> 账号。</p>
    </div>
</body>
</html>
