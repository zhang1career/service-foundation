{% comment %}
config_entry.public：0=private（按 condition）；1=public（无条件，condition 须为空）
参数: field_id — select id；selected — str 与选项 value 一致；public_options — dict str_kv(config_entry_public)
{% endcomment %}
<div class="form-group">
    <label class="form-label" for="{{ field_id }}">类型 *</label>
    <select id="{{ field_id }}" name="{{ name|default:'public' }}" class="form-input">
        {% for val, label in public_options %}
        <option value="{{ val }}"{% if selected == val %} selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</div>
