{% comment %}
通知中心子导航（与 verify_subnav.html 一致：激活项蓝底白字，未激活灰底）

参数:
  active — callers | notices | invoke
{% endcomment %}
{% with active_cls='bg-blue-600 text-white rounded-lg' inactive_cls='bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300' base_cls='px-4 py-2' %}
<nav class="flex space-x-4 mb-6" aria-label="通知中心导航">
    <a href="{% url 'console:notice-callers' %}"
       class="{{ base_cls }} {% if active == 'callers' %}{{ active_cls }}{% else %}{{ inactive_cls }}{% endif %}">调用方</a>
    <a href="{% url 'console:notice-notices' %}"
       class="{{ base_cls }} {% if active == 'notices' %}{{ active_cls }}{% else %}{{ inactive_cls }}{% endif %}">通知管理</a>
    <a href="{% url 'console:notice-invoke' %}"
       class="{{ base_cls }} {% if active == 'invoke' %}{{ active_cls }}{% else %}{{ inactive_cls }}{% endif %}">调用</a>
</nav>
{% endwith %}
