{% if messages %}
<div class="mb-4 space-y-2">
    {% for message in messages %}
    <div class="rounded border px-3 py-2 text-sm {% if message.tags == 'error' %}border-red-200 bg-red-50 text-red-800{% else %}border-green-200 bg-green-50 text-green-800{% endif %}">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}
